name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Ruff lint
        run: ruff check app
      - name: Import smoke test
        run: python -c "import app.main; print('api imports OK')"

  web:
    name: Web (typecheck + prisma + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Prisma schema
        run: pnpm exec prisma validate
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Typecheck
        run: pnpm --filter @daily-job-hub/web typecheck
      - name: Build
        run: pnpm --filter @daily-job-hub/web build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXTAUTH_SECRET: ci-build-secret
          AUTH_TRUST_HOST: "true"
