name: daily-job-hub

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daily_job_hub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_job_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: apply Prisma migrations, then exit. Reuses the web image toolchain.
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: pnpm exec prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      DIRECT_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info -Q scrapers,embeddings,celery
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      GREENHOUSE_COMPANIES: ${GREENHOUSE_COMPANIES:-}
      LEVER_COMPANIES: ${LEVER_COMPANIES:-}
      ASHBY_COMPANIES: ${ASHBY_COMPANIES:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      DIRECT_URL: postgresql://postgres:postgres@db:5432/daily_job_hub
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
